{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="mb-4">Submit Project Proposal</h3>
            <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Team Name</label>
                    <input type="text" name="team_name" class="form-control" required
                        placeholder="e.g. Innovators Group">
                </div>
                <div class="mb-3">
                    <label class="form-label">Project Title</label>
                    <input type="text" name="title" class="form-control" required
                        placeholder="e.g. AI-Based Crop Monitoring">
                </div>
                <div class="mb-3">
                    <label class="form-label">Project Description</label>
                    <textarea name="description" class="form-control" rows="4" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">GitHub Repository URL</label>
                    <input type="url" name="github_url" class="form-control" required
                        placeholder="https://github.com/username/repo">
                </div>
                <div class="mb-3">
                    <label class="form-label">Select Supervisor</label>
                    <select name="faculty_id" class="form-select" required>
                        <option value="">Choose a Faculty Member...</option>
                        {% for faculty in faculty_list %}
                        <option value="{{ faculty.id }}">{{ faculty.username }} ({{ faculty.department }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Submit Proposal</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
